<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" style="background: #fafafa;">
  <!-- Title -->
  <text x="600" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a237e">
    Traditional AI Development vs. Scrum Workflow
  </text>

  <!-- ========== BEFORE (Left Side) ========== -->
  <g id="before">
    <!-- Header -->
    <text x="300" y="70" font-size="18" font-weight="bold" text-anchor="middle" fill="#d32f2f">
      ❌ Traditional (Chaotic)
    </text>

    <!-- Vague Spec -->
    <rect x="150" y="110" width="150" height="60" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2" rx="6"/>
    <text x="225" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#b71c1c">Vague Spec</text>
    <text x="225" y="155" font-size="10" text-anchor="middle" fill="#b71c1c">"Add user auth"</text>
    <text x="225" y="167" font-size="10" text-anchor="middle" fill="#b71c1c">🤷 Unclear</text>

    <!-- Arrow 1 -->
    <path d="M 225 170 L 225 200" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

    <!-- Implement -->
    <rect x="150" y="200" width="150" height="60" fill="#ffcdd2" stroke="#d32f2f" stroke-width="2" rx="6"/>
    <text x="225" y="230" font-size="12" font-weight="bold" text-anchor="middle" fill="#b71c1c">Implement</text>
    <text x="225" y="245" font-size="10" text-anchor="middle" fill="#b71c1c">(AI implements)</text>
    <text x="225" y="257" font-size="10" text-anchor="middle" fill="#b71c1c">⚠️ Guess</text>

    <!-- Arrow 2 -->
    <path d="M 225 260 L 225 290" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

    <!-- Self Review (Problem) -->
    <rect x="150" y="290" width="150" height="60" fill="#ff6f6f" stroke="#c62828" stroke-width="2" rx="6"/>
    <text x="225" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">Self Review</text>
    <text x="225" y="335" font-size="10" text-anchor="middle" fill="#fff">(Same AI)</text>
    <text x="225" y="347" font-size="10" text-anchor="middle" fill="#fff">🔴 Blind Spots!</text>

    <!-- Arrow 3 -->
    <path d="M 225 350 L 225 380" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

    <!-- Ship -->
    <rect x="150" y="380" width="150" height="60" fill="#ff8a80" stroke="#b71c1c" stroke-width="3" rx="6"/>
    <text x="225" y="410" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">🚢 Ship</text>
    <text x="225" y="425" font-size="10" text-anchor="middle" fill="#fff">Pray it works 😰</text>

    <!-- Stats -->
    <text x="225" y="465" font-size="11" text-anchor="middle" fill="#d32f2f" font-weight="bold">
      4 production bugs/month
    </text>

  </g>

  <!-- Divider -->
  <line x1="600" y1="60" x2="600" y2="480" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- ========== AFTER (Right Side) ========== -->
  <g id="after">
    <!-- Header -->
    <text x="900" y="70" font-size="18" font-weight="bold" text-anchor="middle" fill="#1b5e20">
      ✅ Scrum Workflow (Clear)
    </text>

    <!-- Multi-Agent Refinement -->
    <rect x="750" y="110" width="150" height="60" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2" rx="6"/>
    <text x="825" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="#1b5e20">1. Refine</text>
    <text x="825" y="145" font-size="9" text-anchor="middle" fill="#1b5e20">Architect + Dev + QA</text>
    <text x="825" y="157" font-size="9" text-anchor="middle" fill="#1b5e20">✓ Multi-perspective</text>

    <!-- Arrow 1 -->
    <path d="M 825 170 L 825 200" stroke="#1b5e20" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

    <!-- Validate -->
    <rect x="750" y="200" width="150" height="60" fill="#b2dfdb" stroke="#00695c" stroke-width="2" rx="6"/>
    <text x="825" y="230" font-size="12" font-weight="bold" text-anchor="middle" fill="#00695c">2. Validate</text>
    <text x="825" y="245" font-size="9" text-anchor="middle" fill="#00695c">✓ 5 Criteria Check</text>
    <text x="825" y="257" font-size="9" text-anchor="middle" fill="#00695c">✓ Immutable Plan</text>

    <!-- Arrow 2 -->
    <path d="M 825 260 L 825 290" stroke="#1b5e20" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

    <!-- Implement (Clear Plan) -->
    <rect x="750" y="290" width="150" height="60" fill="#bbdefb" stroke="#0d47a1" stroke-width="2" rx="6"/>
    <text x="825" y="320" font-size="12" font-weight="bold" text-anchor="middle" fill="#0d47a1">3. Develop</text>
    <text x="825" y="335" font-size="9" text-anchor="middle" fill="#0d47a1">Follow clear plan</text>
    <text x="825" y="347" font-size="9" text-anchor="middle" fill="#0d47a1">✓ No guessing</text>

    <!-- Arrow 3 (Split) -->
    <path d="M 825 350 L 825 370 L 750 370 L 750 400" stroke="#0d47a1" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
    <text x="760" y="365" font-size="9" fill="#0d47a1">Review +</text>

    <!-- Review (Separate Agent) -->
    <rect x="650" y="400" width="150" height="60" fill="#fff9c4" stroke="#f57f17" stroke-width="2" rx="6"/>
    <text x="725" y="425" font-size="11" font-weight="bold" text-anchor="middle" fill="#f57f17">4. Separate Review</text>
    <text x="725" y="440" font-size="9" text-anchor="middle" fill="#f57f17">Different agent</text>
    <text x="725" y="452" font-size="9" text-anchor="middle" fill="#f57f17">✓ Catch issues</text>

    <!-- Arrow to Human Gate -->
    <path d="M 750 430 L 820 430" stroke="#f57f17" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

    <!-- Human Approval -->
    <rect x="820" y="400" width="150" height="60" fill="#f0f4c3" stroke="#827717" stroke-width="3" rx="6"/>
    <text x="895" y="425" font-size="11" font-weight="bold" text-anchor="middle" fill="#827717">5. Human Gate</text>
    <text x="895" y="440" font-size="9" text-anchor="middle" fill="#827717">👤 Final decision</text>
    <text x="895" y="452" font-size="9" text-anchor="middle" fill="#827717">✓ Audit trail</text>

    <!-- Arrow to Ship -->
    <path d="M 970 430 L 1020 430" stroke="#827717" stroke-width="2" fill="none" marker-end="url(#arrow-yellow)"/>

    <!-- Ship -->
    <rect x="1020" y="400" width="130" height="60" fill="#a5d6a7" stroke="#2e7d32" stroke-width="3" rx="6"/>
    <text x="1085" y="425" font-size="12" font-weight="bold" text-anchor="middle" fill="#1b5e20">🎉 SHIPPED</text>
    <text x="1085" y="442" font-size="10" text-anchor="middle" fill="#1b5e20">Confidence!</text>

    <!-- Stats -->
    <text x="900" y="465" font-size="11" text-anchor="middle" fill="#1b5e20" font-weight="bold">
      2 production bugs/month (50% less!)
    </text>

  </g>

  <!-- Bottom comparison -->
  <g id="comparison">
    <rect x="30" y="490" width="1140" height="1" fill="#ccc"/>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d32f2f"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1b5e20"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0d47a1"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f57f17"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#827717"/>
    </marker>
  </defs>
</svg>
