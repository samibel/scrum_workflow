# scrum_workflow Default Configuration
# This file provides framework-level defaults
# Projects can override these values in their project-root/config.yaml
#
# REQUIRED FIELDS:
#   - platform: Must be one of: claude-code, github-copilot, opencode, windsurf
#
# OPTIONAL FIELDS (with defaults):
#   - active_agents: Array of agent names (default: architect, developer, qa)
#   - token_budgets: Platform-specific token limits (default values provided below)
#   - framework_version: Version string for copy-based updates (default: 1.0.0)

# Target platform: claude-code, github-copilot, opencode, windsurf
# Determines which AI coding assistant will interpret the framework
platform: claude-code

# Active agents for MVP (matches files in agents/)
# These are the agent roles available in the framework
active_agents:
  - architect
  - developer
  - qa

# Token budgets per platform (tokens)
# coordination: Budget for primary model that orchestrates workflows
# sub_agent: Budget for lighter models used for parallel perspectives and analysis
token_budgets:
  claude-code:
    coordination: 4000      # Primary model for orchestration
    sub_agent: 2000         # Lighter models for perspectives
  github-copilot:
    coordination: 8000
    sub_agent: 4000
  opencode:
    coordination: 8000
    sub_agent: 4000
  windsurf:
    coordination: 8000
    sub_agent: 4000

# Refinement settings
# Maximum cross-talk rounds before deadlock escalation
refinement_max_rounds: 3

# Keep temporary agent files after synthesis for debugging
keep_agent_temp_files: false

# Estimation variance threshold for Wideband Delphi re-estimation (story points)
estimation_variance_threshold: 2

# Exit early when only non-blockers remain in cross-talk
early_exit_on_consensus: true

# Automatically mark security issues as blockers in cross-talk
security_auto_blocker: true

# Adaptive workflow depth thresholds (FR-33, FR-36)
# Maps story risk_level (from story-classifier) to workflow depth
# Customize these to adjust process rigor per risk level
# Valid depth values: light, standard, heavy
workflow_depth_thresholds:
  low: light          # Low-risk stories get lightweight process
  medium: standard    # Medium-risk stories get full standard process
  high: heavy         # High-risk stories get maximum rigor
  critical: heavy     # Critical-risk stories get maximum rigor

# Dynamic agent dispatch (FR-34)
# Enable/disable dynamic agent selection during /scrum-refine-ticket
# When disabled, uses static default set: [architect, developer, qa]
agent_dispatch_enabled: true

# Greenfield workflow settings (idea → brief → epics → tickets)
# Controls the pre-ticket pipeline: /scrum-create-brief, /scrum-decompose-epics,
# /scrum-draft-stories. Tunable per project.
greenfield:
  # Maximum Reflection-Loop interview rounds before halting with a warning.
  # The loop normally runs until no open questions remain; this is a safety net
  # for pathological cases. Raise with care — excessive interviewing wastes tokens.
  brief_max_interview_rounds: 5

  # Target story count per epic used by the epic-decomposer agent.
  # See data/epic-decomposition-rules.yaml for the full size policy.
  epic_target_story_count: 5

  # Max parallel subagents spawned by /scrum-draft-stories.
  # Cap protects token budget; 5 is a healthy default for most projects.
  max_parallel_story_drafters: 5

  # Agents invoked in parallel during /scrum-create-brief brainstorming phase.
  # Must match files in agents/. `developer` is intentionally omitted —
  # implementation perspective biases product-level decisions. Customize to
  # add domain experts (e.g. security-reviewer, ux-reviewer).
  brief_brainstorm_agents:
    - product-strategist
    - architect
    - qa

# Framework version (for copy-based updates)
# Used to track framework version for distribution and migration
framework_version: 1.1.0
