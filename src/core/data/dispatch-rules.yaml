# Dispatch Rules Reference Data
# Used by the agent-dispatcher skill to dynamically select agents for refinement
# Referenced by: scrum_workflow/skills/agent-dispatcher/SKILL.md
# Invoked during: /scrum-refine-ticket workflow (after depth detection, before agent spawning)
#
# Rule Composition Order:
#   1. Check depth — if light, short-circuit to [developer] only
#   2. Start with default agent set
#   3. Apply type-based overrides (REPLACE default set if type-specific rule exists)
#   4. Apply risk-based additions (ADD agents based on risk_level)
#   5. Apply domain-tag-based additions (ADD agents based on matching domain_tags)
#   6. Deduplicate the agent list
#   7. Validate each agent file exists — skip missing agents gracefully

# =============================================================================
# Light Depth Override
# =============================================================================
# When depth is "light", the dispatcher short-circuits and returns [developer] only.
# No other dispatch rules are applied. This preserves existing light depth behavior.

light_depth_override:
  depth: light
  agents:
    - developer
  description: "Light depth short-circuit — developer only, no other rules applied"

# =============================================================================
# Default Agent Set
# =============================================================================
# The standard agent set used when no type-specific override applies,
# or when classification is ambiguous / story attributes are missing.
# This matches the current hardcoded behavior in the refinement workflow.

default_agents:
  agents:
    - architect
    - developer
    - qa
  description: "Default agent set — used when no specific dispatch rules match or dispatch is disabled"

# =============================================================================
# Type-Based Override Rules
# =============================================================================
# Type-based rules REPLACE the default agent set entirely.
# If the story type has a matching rule here, that rule's agent list is used
# instead of the default set. If no type matches, the default set is kept.

type_based_overrides:
  # Infrastructure stories skip QA — focus on architecture and implementation
  infrastructure:
    agents:
      - architect
      - developer
    description: "Infrastructure stories focus on architecture and implementation — QA skipped"

  # Feature stories use the full default set (no override needed, listed for clarity)
  # feature: uses default set [architect, developer, qa]

  # Bugfix stories use the full default set (no override needed)
  # bugfix: uses default set [architect, developer, qa]

  # Refactor stories use the full default set (no override needed)
  # refactor: uses default set [architect, developer, qa]

# =============================================================================
# Risk-Based Addition Rules
# =============================================================================
# Risk-based rules ADD agents to the current set (they do NOT replace).
# After type-based overrides determine the base set, risk-based additions
# append extra agents based on the story's risk_level.

risk_based_additions:
  # High risk adds security-reviewer for security-focused review
  high:
    add_agents:
      - security-reviewer
    description: "High-risk stories add security-reviewer for security-focused review"

  # Critical risk also adds security-reviewer (same as high)
  critical:
    add_agents:
      - security-reviewer
    description: "Critical-risk stories add security-reviewer for security-focused review"

  # Medium risk — no additional agents from risk rules
  medium:
    add_agents: []
    description: "Medium-risk stories — no additional agents from risk rules"

  # Low risk — no additional agents from risk rules
  low:
    add_agents: []
    description: "Low-risk stories — no additional agents from risk rules"

# =============================================================================
# Domain-Tag-Based Addition Rules
# =============================================================================
# Domain-tag rules ADD agents to the current set (they do NOT replace).
# After type and risk rules, domain-tag additions append extra agents
# based on matching tags in the story's domain_tags array.
# Multiple tags can match, each adding their respective agents.

# Domain Tag Glossary
# ------------------------------------------------------------------------------
# The tags below are matched case-sensitively against story.domain_tags[].
#
#   frontend    — user-facing web/mobile UI code and flows
#   ui          — shared component library, design tokens, styling primitives
#   ux          — user experience flows, interaction, information architecture
#   ox          — Operator Experience: internal/operator-facing UIs and tooling
#   api         — public or service-to-service HTTP/RPC APIs
#   contract    — consumer-driven contracts, OpenAPI/JSON-schema artifacts
#   integration — cross-service or third-party integration points
#
# Opt-in flags (read from story frontmatter, NOT from tags):
#   needs_draft:    boolean — when true + UI/UX/OX tag present, dispatches ux-draft-agent
#                   before ux-reviewer (Reflection-Loop: generator → critic)
#   draft_format:   "mermaid" (default) | "excalidraw" — read by ux-draft-agent
#                   to select output mode. Excalidraw requires the
#                   excalidraw-diagram-skill and is graceful-fallback to Mermaid.

domain_tag_additions:
  # Frontend/UI/UX/OX tags add ux-reviewer for design and usability review
  # OX is optional: if no OX/UX-related tag is present, ux-reviewer is not dispatched
  ux_review:
    tags:
      - frontend
      - ui
      - ux
      - ox
    add_agent: ux-reviewer
    description: "Frontend/UI/UX/OX domain tags add ux-reviewer for design and usability review (optional)"

  # UI/UX/OX tag + needs_draft: true adds ux-draft-agent as the generator half of a
  # Reflection Loop (Generator–Critic). The draft agent runs before ux-reviewer so
  # the reviewer has a concrete low-fidelity draft to critique. Without needs_draft,
  # ux-draft-agent is not dispatched.
  ux_draft:
    tags:
      - ui
      - ux
      - ox
    requires_flag: needs_draft
    add_agent: ux-draft-agent
    run_before: ux-reviewer
    description: "UI/UX/OX tag + needs_draft:true adds ux-draft-agent as draft generator; runs before ux-reviewer (Reflection Loop)"

  # API/Contract/Integration tags add contract-validator for API contract review
  contract_review:
    tags:
      - api
      - contract
      - integration
    add_agent: contract-validator
    description: "API/Contract/Integration domain tags add contract-validator for API contract review"

# =============================================================================
# Always-On Review Agents
# =============================================================================
# These agents are appended to the dispatched set for the /scrum-review-story
# workflow regardless of story type, risk_level, or domain_tags.
# They run AFTER the primary review evaluation as a final supplementary pass.
#
# Unlike `domain_tag_additions`, these rules are unconditional for the named
# workflow context. They apply only when the dispatcher is invoked with
# `workflow: review-story` (i.e., from /scrum-review-story).

always_in_review_story:
  # Clean Code & Simplification reviewer — always runs at the end of every
  # /scrum-review-story to catch readability, complexity, and over-engineering
  # issues that the primary reviewer (focused on spec/AC/tests/architecture)
  # routinely overlooks.
  clean_code_review:
    add_agent: clean-code-reviewer
    description: "Always run clean-code-reviewer at end of /scrum-review-story regardless of type/risk/tags"

  # Karpathy Guidelines reviewer — always runs at the end of every
  # /scrum-review-story to catch coding-discipline violations (assumption gaps,
  # premature abstraction introduced by THIS story, drive-by refactors, scope
  # creep) that neither the primary reviewer (spec/AC focus) nor the Clean Code
  # reviewer (artifact focus) systematically evaluate. Runs AFTER the Clean
  # Code reviewer so it can [DUP]-deduplicate K2 ⇄ D4/D5 overlaps.
  karpathy_review:
    add_agent: karpathy-guidelines-reviewer
    description: "Always run karpathy-guidelines-reviewer at end of /scrum-review-story regardless of type/risk/tags"

# =============================================================================
# Customization Guide
# =============================================================================
# To add a new dispatch rule:
#   1. Type override: Add a new entry under type_based_overrides with the type name and agents list
#   2. Risk addition: Add a new entry under risk_based_additions with the risk level and add_agents list
#   3. Domain-tag addition: Add a new entry under domain_tag_additions with tags array and add_agent
#
# To disable an existing rule:
#   - Remove or comment out the entry
#   - Or set agents/add_agents to an empty array []
#
# Agent names must be lowercase with hyphens, matching files in scrum_workflow/agents/{name}.md
# Extended agents (security-reviewer, ux-reviewer, contract-validator) are created in Story 9.4.
# Until then, these agent slots are skipped gracefully with a logged note.
